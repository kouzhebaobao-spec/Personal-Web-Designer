name: 自动部署到腾讯云 CloudBase

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 CloudBase CLI
        run: npm install -g @cloudbase/cli@latest

      - name: 部署到静态网站托管
        run: |
          cloudbase hosting deploy . / -e ${{ secrets.ENV_ID }} --secretId ${{ secrets.SECRET_ID }} --secretKey ${{ secrets.SECRET_KEY }}
